<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rakit — agent control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=General+Sans:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg-deep: #0c0e12;
  --bg-surface: #12151a;
  --bg-card: #171b22;
  --bg-elevated: #1c2129;
  --bg-hover: #222832;
  --border: #262d38;
  --border-subtle: #1e2430;
  --text-primary: #e8ecf4;
  --text-secondary: #8892a4;
  --text-muted: #555f73;
  --accent: #0ea5e9;
  --accent-dim: #0c7db8;
  --accent-glow: rgba(14,165,233,0.12);
  --accent-glow-strong: rgba(14,165,233,0.25);
  --success: #22c55e;
  --success-dim: rgba(34,197,94,0.12);
  --warning: #f59e0b;
  --warning-dim: rgba(245,158,11,0.12);
  --danger: #ef4444;
  --danger-dim: rgba(239,68,68,0.12);
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-w: 240px;
  --sidebar-collapsed: 60px;
  --transition: 180ms cubic-bezier(0.4,0,0.2,1);
}

html{font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:'General Sans',system-ui,-apple-system,sans-serif;
  background:var(--bg-deep);
  color:var(--text-primary);
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:var(--bg-surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  transition:width var(--transition),min-width var(--transition);
  z-index:20;
  position:relative;
}
.sidebar.collapsed{
  width:var(--sidebar-collapsed);
  min-width:var(--sidebar-collapsed);
}

.sidebar-header{
  padding:20px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--border);
  min-height:65px;
}
.sidebar-logo{
  width:28px;height:28px;
  background:linear-gradient(135deg,var(--accent),#06b6d4);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;
  flex-shrink:0;
}
.sidebar-title{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;font-size:15px;
  letter-spacing:-0.02em;
  white-space:nowrap;overflow:hidden;
  transition:opacity var(--transition);
}
.sidebar.collapsed .sidebar-title{opacity:0;width:0}

.sidebar-toggle{
  position:absolute;top:20px;right:-14px;
  width:28px;height:28px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color:var(--text-secondary);
  transition:all var(--transition);
  z-index:30;
}
.sidebar-toggle:hover{background:var(--bg-hover);color:var(--text-primary)}
.sidebar-toggle svg{transition:transform var(--transition)}
.sidebar.collapsed .sidebar-toggle svg{transform:rotate(180deg)}

.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-section{margin-bottom:8px}
.nav-section-label{
  padding:8px 12px 6px;
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--text-muted);
  white-space:nowrap;
  overflow:hidden;
  transition:opacity var(--transition);
}
.sidebar.collapsed .nav-section-label{opacity:0}

.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;
  border-radius:var(--radius);
  color:var(--text-secondary);
  cursor:pointer;
  transition:all var(--transition);
  white-space:nowrap;
  position:relative;
}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{
  background:var(--accent-glow);
  color:var(--accent);
}
.nav-item.active::before{
  content:'';
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:18px;
  background:var(--accent);
  border-radius:0 2px 2px 0;
}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-item-label{overflow:hidden;transition:opacity var(--transition)}
.sidebar.collapsed .nav-item-label{opacity:0;width:0}

/* ── Main ── */
.main{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;
  background:var(--bg-deep);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(14,165,233,0.04),transparent);
}
.main-header{
  padding:16px 28px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  min-height:65px;
  background:var(--bg-surface);
}
.main-header h1{
  font-size:16px;font-weight:600;
  letter-spacing:-0.01em;
}
.main-header-actions{display:flex;gap:8px;align-items:center}

.main-content{
  flex:1;overflow-y:auto;
  padding:28px;
}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;
  border-radius:var(--radius);
  font-size:13px;font-weight:500;
  cursor:pointer;border:none;
  transition:all var(--transition);
  font-family:inherit;
  white-space:nowrap;
}
.btn svg{width:15px;height:15px}
.btn-primary{
  background:var(--accent);color:#fff;
}
.btn-primary:hover{background:var(--accent-dim)}
.btn-ghost{
  background:transparent;
  color:var(--text-secondary);
  border:1px solid var(--border);
}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--text-muted)}
.btn-danger{
  background:var(--danger-dim);color:var(--danger);
  border:1px solid rgba(239,68,68,0.2);
}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{
  width:32px;height:32px;padding:0;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:var(--radius);
  background:transparent;border:1px solid var(--border);
  color:var(--text-secondary);cursor:pointer;
  transition:all var(--transition);
}
.btn-icon:hover{background:var(--bg-hover);color:var(--text-primary)}

/* ── Cards ── */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:20px;
  transition:border-color var(--transition);
}
.card:hover{border-color:var(--text-muted)}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
  margin-bottom:24px;
}
.stat-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:20px;
  transition:all var(--transition);
  cursor:default;
}
.stat-card:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-glow)}
.stat-card-label{
  font-size:12px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.06em;
  margin-bottom:8px;
}
.stat-card-value{
  font-size:28px;font-weight:700;
  letter-spacing:-0.03em;
  font-family:'IBM Plex Mono',monospace;
}
.stat-card-value.accent{color:var(--accent)}

/* ── Table ── */
.table-wrap{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  overflow:hidden;
}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg-elevated)}
th{
  padding:10px 16px;
  font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;
  color:var(--text-muted);
  text-align:left;
  border-bottom:1px solid var(--border);
}
td{
  padding:12px 16px;
  font-size:13px;
  border-bottom:1px solid var(--border-subtle);
  color:var(--text-secondary);
}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-hover);color:var(--text-primary)}
td.mono{font-family:'IBM Plex Mono',monospace;font-size:12px}

/* ── Badge ── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;
  border-radius:20px;
  font-size:11px;font-weight:600;
  letter-spacing:0.02em;
}
.badge-success{background:var(--success-dim);color:var(--success)}
.badge-warning{background:var(--warning-dim);color:var(--warning)}
.badge-danger{background:var(--danger-dim);color:var(--danger)}
.badge-neutral{background:var(--bg-hover);color:var(--text-secondary)}

/* ── Forms / Inputs ── */
.form-group{margin-bottom:16px}
.form-label{
  display:block;font-size:12px;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;
  letter-spacing:0.04em;margin-bottom:6px;
}
input[type="text"],input[type="search"],textarea,select{
  width:100%;
  padding:9px 12px;
  background:var(--bg-deep);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text-primary);
  font-size:13px;
  font-family:inherit;
  transition:border-color var(--transition);
  outline:none;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select{cursor:pointer}
input::placeholder,textarea::placeholder{color:var(--text-muted)}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:100;
  opacity:0;pointer-events:none;
  transition:opacity 200ms;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  width:90%;max-width:520px;
  max-height:85vh;overflow-y:auto;
  transform:translateY(8px) scale(0.98);
  transition:transform 200ms;
}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-header{
  padding:20px 24px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.modal-header h2{font-size:16px;font-weight:600}
.modal-body{padding:20px 24px}
.modal-footer{
  padding:16px 24px;
  display:flex;justify-content:flex-end;gap:8px;
  border-top:1px solid var(--border);
}

/* ── Toast ── */
.toast-container{
  position:fixed;bottom:24px;right:24px;
  display:flex;flex-direction:column-reverse;gap:8px;
  z-index:200;pointer-events:none;
}
.toast{
  padding:12px 18px;
  border-radius:var(--radius);
  font-size:13px;font-weight:500;
  pointer-events:all;
  animation:toastIn 300ms ease-out,toastOut 300ms 2.7s ease-in forwards;
  max-width:360px;
  border:1px solid;
}
.toast-success{background:var(--success-dim);color:var(--success);border-color:rgba(34,197,94,0.2)}
.toast-error{background:var(--danger-dim);color:var(--danger);border-color:rgba(239,68,68,0.2)}
.toast-info{background:var(--accent-glow);color:var(--accent);border-color:rgba(14,165,233,0.2)}

@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

/* ── Chat ── */
.chat-layout{display:flex;flex-direction:column;height:100%;gap:0}
.chat-topbar{
  display:flex;align-items:center;gap:12px;
  padding-bottom:16px;
  border-bottom:1px solid var(--border-subtle);
  margin-bottom:16px;
}
.chat-topbar select{width:220px;padding:6px 10px;font-size:12px}

.chat-messages{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;
  gap:12px;
  padding-bottom:16px;
}
.chat-msg{
  max-width:72%;
  padding:12px 16px;
  border-radius:var(--radius-lg);
  font-size:13.5px;
  line-height:1.6;
  animation:msgIn 200ms ease-out;
  word-break:break-word;
}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.user{
  align-self:flex-end;
  background:var(--accent);
  color:#fff;
  border-bottom-right-radius:4px;
}
.chat-msg.assistant{
  align-self:flex-start;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  color:var(--text-primary);
  border-bottom-left-radius:4px;
}
.chat-msg.assistant pre{
  background:var(--bg-deep);
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px;
  margin:8px 0;
  overflow-x:auto;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
}
.chat-msg .typing-cursor{
  display:inline-block;
  width:2px;height:1em;
  background:var(--accent);
  margin-left:2px;
  animation:blink 800ms infinite;
  vertical-align:text-bottom;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.chat-input-bar{
  display:flex;gap:8px;
  padding-top:16px;
  border-top:1px solid var(--border);
  margin-top:auto;
}
.chat-input-bar input{
  flex:1;
  padding:11px 14px;
  font-size:13px;
}
.chat-input-bar input:focus{border-color:var(--accent)}

/* ── Provider ── */
.provider-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.provider-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:24px;
}
.provider-card h3{
  font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;
  color:var(--text-muted);margin-bottom:16px;
}
.provider-value{
  font-size:20px;font-weight:700;
  letter-spacing:-0.02em;
  margin-bottom:4px;
}
.provider-label{font-size:12px;color:var(--text-muted)}
.model-list{list-style:none;margin-top:16px}
.model-list li{
  padding:8px 12px;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--text-secondary);
  border-radius:6px;
  cursor:default;
  transition:background var(--transition);
}
.model-list li:hover{background:var(--bg-hover)}
.model-list li.active{color:var(--accent);background:var(--accent-glow)}

/* ── Memory ── */
.memory-grid{display:grid;grid-template-columns:auto 1fr auto;gap:0}
.memory-entry{
  display:contents;
}
.memory-entry:hover > *{background:var(--bg-hover)}
.memory-key{
  padding:10px 16px;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--accent);
  border-bottom:1px solid var(--border-subtle);
  border-right:1px solid var(--border-subtle);
  min-width:200px;
  cursor:default;
}
.memory-val{
  padding:10px 16px;
  font-size:13px;
  color:var(--text-secondary);
  border-bottom:1px solid var(--border-subtle);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:400px;
}
.memory-actions{
  padding:6px 12px;
  border-bottom:1px solid var(--border-subtle);
  display:flex;gap:4px;
}

/* ── Empty state ── */
.empty-state{
  text-align:center;padding:48px 20px;
  color:var(--text-muted);
}
.empty-state svg{width:40px;height:40px;margin-bottom:12px;opacity:0.3}
.empty-state p{font-size:13px}

/* ── Page transition ── */
.page{display:none;animation:pageIn 200ms ease-out}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.page-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.page-header h2{font-size:18px;font-weight:600;letter-spacing:-0.01em}

/* ── Skill detail expansion ── */
.skill-expand{display:none;padding:16px;background:var(--bg-elevated);border-top:1px solid var(--border)}
.skill-expand.open{display:table-row-group}
.skill-expand td{padding:16px}
.skill-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.skill-detail-item label{font-size:11px;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:2px}
.skill-detail-item span{font-size:13px;color:var(--text-primary)}

/* ── Responsive fine-tuning ── */
@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%)}
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar-toggle{display:none}
}
</style>
</head>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">r</div>
    <span class="sidebar-title">rakit</span>

  <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span class="nav-item-label">Dashboard</span>
      </div>

        <span class="nav-item-label">Chat</span>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Management</div>
      <div class="nav-item" data-page="sessions" onclick="navigate('sessions')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="nav-item-label">Sessions</span>
      </div>
      <div class="nav-item" data-page="skills" onclick="navigate('skills')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span class="nav-item-label">Skills</span>
      </div>
      <div class="nav-item" data-page="tools" onclick="navigate('tools')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        <span class="nav-item-label">Tools</span>
      </div>
      <div class="nav-item" data-page="memory" onclick="navigate('memory')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span class="nav-item-label">Memory</span>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Configuration</div>
      <div class="nav-item" data-page="provider" onclick="navigate('provider')">

</aside>

<!-- Main -->
<div class="main">
  <div class="main-header">
    <h1 id="page-title">Dashboard</h1>
    <div class="main-header-actions" id="header-actions"></div>
  </div>
  <div class="main-content" id="main-content"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title">Modal</h2>
      <button class="btn-icon" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toast-container"></div>

<script>
// ── State ──
const state = {
  page: 'dashboard',
  sessions: [],
  skills: [],
  tools: [],
  memoryKeys: [],
  provider: null,
  chatMessages: [],
  chatSessionId: '',
  chatSessions: [],
  streaming: false,
};

// ── API helpers ──
const API = {
  async get(path) {
    const r = await fetch(path);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.error || `${r.status} ${r.statusText}`);
    }
    return r.json();
  },
  async put(path, body) {
    const r = await fetch(path, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
  async del(path) {
    const r = await fetch(path, { method: 'DELETE' });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
};

// ── Toast ──
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ── Modal ──
function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-footer').innerHTML = footerHtml;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── Navigation ──
function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === page);
  });
  const titles = {
    dashboard: 'Dashboard',
    chat: 'Chat',
    sessions: 'Sessions',
    skills: 'Skills',
    tools: 'Tools',
    memory: 'Memory',
    provider: 'Provider',
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('header-actions').innerHTML = '';
  renderPage(page);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ── Formatting ──
function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString(undefined, {
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}
function shortId(id) {
  return id ? id.substring(0, 8) + '...' : '—';
}

// ── Render dispatcher ──
function renderPage(page) {
  const c = document.getElementById('main-content');
  c.innerHTML = '';
  switch (page) {
    case 'dashboard': renderDashboard(c); break;
    case 'chat': renderChat(c); break;
    case 'sessions': renderSessions(c); break;
    case 'skills': renderSkills(c); break;
    case 'tools': renderTools(c); break;
    case 'memory': renderMemory(c); break;
    case 'provider': renderProvider(c); break;
  }
}

// ═══════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════
async function renderDashboard(c) {
  c.innerHTML = `<div class="stat-grid" id="dash-stats">
    <div class="stat-card"><div class="stat-card-label">Sessions</div><div class="stat-card-value" id="stat-sessions">—</div></div>
    <div class="stat-card"><div class="stat-card-label">Skills</div><div class="stat-card-value" id="stat-skills">—</div></div>
    <div class="stat-card"><div class="stat-card-label">Tools</div><div class="stat-card-value" id="stat-tools">—</div></div>
    <div class="stat-card"><div class="stat-card-label">Memory Keys</div><div class="stat-card-value" id="stat-memory">—</div></div>
  </div>
  <div id="dash-provider" class="card" style="margin-top:8px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Provider</div>
        <div id="dash-prov-name" style="font-size:18px;font-weight:700">—</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Model</div>
        <div id="dash-prov-model" style="font-size:18px;font-weight:700;color:var(--accent);font-family:'IBM Plex Mono',monospace">—</div>
      </div>
    </div>
  </div>`;

  try {
    const [sess, sk, tl, mem, prov] = await Promise.allSettled([
      API.get('/api/v1/sessions'),
      API.get('/api/v1/skills'),
      API.get('/api/v1/tools'),
      API.get('/api/v1/memory/list'),
      API.get('/api/v1/provider'),
    ]);

    const sessions = sess.status === 'fulfilled' ? (sess.value.sessions || []) : [];
    const skills = sk.status === 'fulfilled' ? (sk.value.skills || []) : [];
    const tools = tl.status === 'fulfilled' ? (tl.value.tools || []) : [];
    const keys = mem.status === 'fulfilled' ? (mem.value.keys || []) : [];

    state.sessions = sessions;
    state.skills = skills;
    state.tools = tools;
    state.memoryKeys = keys;

    document.getElementById('stat-sessions').textContent = sessions.length;
    document.getElementById('stat-skills').textContent = skills.length;
    document.getElementById('stat-tools').textContent = tools.length;
    document.getElementById('stat-memory').textContent = keys.length;

    if (prov.status === 'fulfilled') {
      state.provider = prov.value;
      document.getElementById('dash-prov-name').textContent = prov.value.provider || '—';
      document.getElementById('dash-prov-model').textContent = prov.value.model || '—';
    }
  } catch (e) {
    toast('Failed to load dashboard data', 'error');
  }
}

// ═══════════════════════════════════
// CHAT
// ═══════════════════════════════════
async function renderChat(c) {
  c.style.display = 'flex';
  c.style.flexDirection = 'column';
  c.style.height = '100%';
  c.style.padding = '20px 28px';

  c.innerHTML = `
    <div class="chat-topbar">
      <select id="chat-session-select" onchange="switchChatSession(this.value)">
        <option value="">New session</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="newChatSession()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New
      </button>
      <span style="flex:1"></span>
      <span style="font-size:12px;color:var(--text-muted)" id="chat-status"></span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-bar">
      <input type="text" id="chat-input" placeholder="Send a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}">
      <button class="btn btn-primary" onclick="sendChat()" id="chat-send-btn">Send</button>
    </div>`;

  await loadChatSessions();
}

async function loadChatSessions() {
  try {
    const data = await API.get('/api/v1/sessions');
    state.chatSessions = data.sessions || [];
    const sel = document.getElementById('chat-session-select');
    if (!sel) return;
    sel.innerHTML = '<option value="">New session</option>';
    state.chatSessions.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = shortId(s.id) + ' (' + s.messageCount + ' msgs)';
      if (s.id === state.chatSessionId) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch {}
}

async function newChatSession() {
  try {
    const data = await API.post('/api/v1/sessions');
    state.chatSessionId = data.session.id;
    state.chatMessages = [];
    document.getElementById('chat-messages').innerHTML = '';
    await loadChatSessions();
    toast('New session created', 'success');
  } catch (e) {
    toast('Failed to create session: ' + e.message, 'error');
  }
}

function switchChatSession(id) {
  state.chatSessionId = id;
  state.chatMessages = [];
  document.getElementById('chat-messages').innerHTML = '';
  if (!id) return;
  // Fetch session history
  API.get('/api/v1/sessions/' + id).then(data => {
    const sess = data.session;
    if (sess && sess.messages) {
      sess.messages.forEach(m => {
        appendChatMsg(m.role || 'assistant', m.content || '');
      });
    }
  }).catch(() => {});
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || state.streaming) return;
  input.value = '';

  appendChatMsg('user', msg);

  state.streaming = true;
  document.getElementById('chat-status').textContent = 'Streaming...';
  document.getElementById('chat-send-btn').disabled = true;

  const assistantEl = appendChatMsg('assistant', '');
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  assistantEl.appendChild(cursor);

  try {
    const body = { message: msg };
    if (state.chatSessionId) body.sessionId = state.chatSessionId;

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) throw new Error(await res.text());

    // Capture session ID from response if new
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (!data || data === '[DONE]') continue;

        try {
          const event = JSON.parse(data);

          // Handle AI SDK format
          if (event.type === 'text-delta' && event.textDelta) {
            cursor.insertAdjacentText('beforebegin', event.textDelta);
            scrollChat();
          } else if (event.type === 'text' && event.text) {
            cursor.insertAdjacentText('beforebegin', event.text);
            scrollChat();
          } else if (event.type === 'tool-call') {
            cursor.insertAdjacentText('beforebegin', `\n[Tool: ${event.toolName}]\n`);
          } else if (event.type === 'tool-result') {
            cursor.insertAdjacentText('beforebegin', `\n[Result received]\n`);
          } else if (event.type === 'step-start') {
            // handle step start
          } else if (event.type === 'finish') {
            // done
          } else if (event.type === 'session' && event.sessionId) {
            state.chatSessionId = event.sessionId;
            loadChatSessions();
          }

          // AGUI message format
          if (event.type === 'MESSAGE_START' && event.message) {
            if (event.message.id && !state.chatSessionId) {
              // session might be in metadata
            }
          } else if (event.type === 'CONTENT_BLOCK_DELTA' && event.delta) {
            if (event.delta.type === 'text_delta' && event.delta.text) {
              cursor.insertAdjacentText('beforebegin', event.delta.text);
              scrollChat();
            }
          }
        } catch {}
      }
    }
  } catch (e) {
    cursor.insertAdjacentText('beforebegin', 'Error: ' + e.message);
    toast('Chat error: ' + e.message, 'error');
  }

  cursor.remove();
  state.streaming = false;
  document.getElementById('chat-status').textContent = '';
  document.getElementById('chat-send-btn').disabled = false;
}

function appendChatMsg(role, text) {
  const container = document.getElementById('chat-messages');
  if (!container) return null;
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  container.appendChild(div);
  scrollChat();
  return div;
}

function scrollChat() {
  const c = document.getElementById('chat-messages');
  if (c) c.scrollTop = c.scrollHeight;
}

// ═══════════════════════════════════
// SESSIONS
// ═══════════════════════════════════
async function renderSessions(c) {
  const actions = document.getElementById('header-actions');
  actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="createSession()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Session
  </button>`;

  c.innerHTML = '<div class="table-wrap"><table><thead><tr><th>ID</th><th>Agent</th><th>Messages</th><th>Created</th><th>Updated</th><th></th></tr></thead><tbody id="sessions-tbody"></tbody></table></div>';

  try {
    const data = await API.get('/api/v1/sessions');
    state.sessions = data.sessions || [];
    const tbody = document.getElementById('sessions-tbody');

    if (state.sessions.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><p>No sessions yet</p></div></td></tr>';
      return;
    }

    tbody.innerHTML = state.sessions.map(s => `
      <tr>
        <td class="mono">${shortId(s.id)}</td>
        <td class="mono">${shortId(s.agentId)}</td>
        <td>${s.messageCount}</td>
        <td>${fmtDate(s.createdAt)}</td>
        <td>${fmtDate(s.updatedAt)}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteSession('${s.id}')">Delete</button></td>
      </tr>`).join('');
  } catch (e) {
    toast('Failed to load sessions', 'error');
  }
}

async function createSession() {
  try {
    await API.post('/api/v1/sessions');
    toast('Session created', 'success');
    renderSessions(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

async function deleteSession(id) {
  try {
    await API.del('/api/v1/sessions/' + id);
    toast('Session deleted', 'success');
    renderSessions(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════
// SKILLS
// ═══════════════════════════════════
async function renderSkills(c) {
  const actions = document.getElementById('header-actions');
  actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openSkillModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Register Skill
  </button>`;

  c.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Name</th><th>Description</th><th>Version</th><th>Status</th><th></th></tr></thead><tbody id="skills-tbody"></tbody></table></div>';

  try {
    const data = await API.get('/api/v1/skills');
    state.skills = data.skills || [];
    const tbody = document.getElementById('skills-tbody');

    if (state.skills.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No skills registered</p></div></td></tr>';
      return;
    }

    tbody.innerHTML = state.skills.map(s => `
      <tr onclick="toggleSkillDetail('${s.name}')" style="cursor:pointer" id="skill-row-${s.name}">
        <td style="font-weight:600;color:var(--text-primary)">${s.name}</td>
        <td>${s.description || '—'}</td>
        <td class="mono">${s.version || '—'}</td>
        <td><span class="badge ${s.enabled !== false ? 'badge-success' : 'badge-warning'}">${s.enabled !== false ? 'Enabled' : 'Disabled'}</span></td>
        <td onclick="event.stopPropagation()">
          <div style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-sm" onclick="toggleSkill('${s.name}',${s.enabled !== false})">${s.enabled !== false ? 'Disable' : 'Enable'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSkill('${s.name}')">Delete</button>
          </div>
        </td>
      </tr>
      <tr class="skill-expand" id="skill-detail-${s.name}">
        <td colspan="5">
          <div class="skill-detail-grid">
            <div class="skill-detail-item"><label>Instructions</label><span>${s.instructions || '—'}</span></div>
            <div class="skill-detail-item"><label>Tools</label><span>${(s.tools && s.tools.length) ? s.tools.length + ' tool(s)' : '—'}</span></div>
          </div>
        </td>
      </tr>`).join('');
  } catch (e) {
    toast('Failed to load skills', 'error');
  }
}

function toggleSkillDetail(name) {
  const el = document.getElementById('skill-detail-' + name);
  if (el) el.classList.toggle('open');
}

function openSkillModal() {
  openModal('Register Skill', `
    <div class="form-group"><label class="form-label">Name</label><input type="text" id="skill-name" placeholder="my-skill"></div>
    <div class="form-group"><label class="form-label">Description</label><input type="text" id="skill-desc" placeholder="What this skill does"></div>
    <div class="form-group"><label class="form-label">Version</label><input type="text" id="skill-version" placeholder="1.0.0"></div>
    <div class="form-group"><label class="form-label">Instructions</label><textarea id="skill-instructions" placeholder="System prompt for the skill"></textarea></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="registerSkill()">Register</button>`);
}

async function registerSkill() {
  try {
    await API.post('/api/v1/skills', {
      name: document.getElementById('skill-name').value,
      description: document.getElementById('skill-desc').value,
      version: document.getElementById('skill-version').value || '1.0.0',
      instructions: document.getElementById('skill-instructions').value,
      tools: [],
      config: {},
      resources: [],
    });
    closeModal();
    toast('Skill registered', 'success');
    renderSkills(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

async function toggleSkill(name, enabled) {
  try {
    await API.post('/api/v1/skills/' + name + '/' + (enabled ? 'disable' : 'enable'));
    toast(`Skill ${enabled ? 'disabled' : 'enabled'}`, 'success');
    renderSkills(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

async function deleteSkill(name) {
  try {
    await API.del('/api/v1/skills/' + name);
    toast('Skill deleted', 'success');
    renderSkills(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════
// TOOLS
// ═══════════════════════════════════
async function renderTools(c) {
  const actions = document.getElementById('header-actions');
  actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openToolModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Tool
  </button>`;

  c.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Name</th><th>Description</th><th>Handler</th><th>Endpoint</th><th></th></tr></thead><tbody id="tools-tbody"></tbody></table></div>';

  try {
    const data = await API.get('/api/v1/tools');
    state.tools = data.tools || [];
    const tbody = document.getElementById('tools-tbody');

    if (state.tools.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No tools configured</p></div></td></tr>';
      return;
    }

    tbody.innerHTML = state.tools.map(t => `
      <tr>
        <td style="font-weight:600;color:var(--text-primary)">${t.name}</td>
        <td>${t.description || '—'}</td>
        <td><span class="badge badge-neutral">${t.handler || 'http'}</span></td>
        <td class="mono" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${t.endpoint || '—'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteTool('${t.name}')">Delete</button></td>
      </tr>`).join('');
  } catch (e) {
    toast('Failed to load tools', 'error');
  }
}

function openToolModal() {
  openModal('Add Tool', `
    <div class="form-group"><label class="form-label">Name</label><input type="text" id="tool-name" placeholder="my-tool"></div>
    <div class="form-group"><label class="form-label">Description</label><input type="text" id="tool-desc" placeholder="What this tool does"></div>
    <div class="form-group"><label class="form-label">Handler</label>
      <select id="tool-handler"><option value="http">HTTP</option></select>
    </div>
    <div class="form-group"><label class="form-label">Endpoint</label><input type="text" id="tool-endpoint" placeholder="https://..."></div>
    <div class="form-group"><label class="form-label">Parameters (JSON Schema)</label><textarea id="tool-params" rows="5" placeholder='{"type":"object","properties":{}}'></textarea></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveTool()">Save</button>`);
}

async function saveTool() {
  try {
    let params = {};
    try { params = JSON.parse(document.getElementById('tool-params').value || '{}'); } catch {}
    await API.post('/api/v1/tools', {
      name: document.getElementById('tool-name').value,
      description: document.getElementById('tool-desc').value,
      handler: document.getElementById('tool-handler').value,
      endpoint: document.getElementById('tool-endpoint').value,
      parameters: params,
    });
    closeModal();
    toast('Tool saved', 'success');
    renderTools(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

async function deleteTool(name) {
  try {
    await API.del('/api/v1/tools/' + name);
    toast('Tool deleted', 'success');
    renderTools(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════
// MEMORY
// ═══════════════════════════════════
async function renderMemory(c) {
  const actions = document.getElementById('header-actions');
  actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openMemoryModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Entry
  </button>`;

  c.innerHTML = `
    <div style="margin-bottom:16px">
      <input type="search" id="memory-search" placeholder="Filter by prefix..." oninput="filterMemory()" style="max-width:300px">
    </div>
    <div class="table-wrap">
      <div class="memory-grid" id="memory-grid">
        <div style="grid-column:1/-1" class="empty-state"><p>Loading...</p></div>
      </div>
    </div>`;

  await loadMemory();
}

async function loadMemory() {
  try {
    const data = await API.get('/api/v1/memory/list');
    state.memoryKeys = data.keys || [];
    renderMemoryGrid(state.memoryKeys);
  } catch (e) {
    toast('Failed to load memory', 'error');
  }
}

function renderMemoryGrid(keys) {
  const grid = document.getElementById('memory-grid');
  if (!grid) return;

  if (keys.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1" class="empty-state"><p>No memory entries</p></div>';
    return;
  }

  grid.innerHTML = keys.map(k => `
    <div class="memory-entry">
      <div class="memory-key">${k}</div>
      <div class="memory-val" id="mem-val-${CSS.escape(k)}">—</div>
      <div class="memory-actions">
        <button class="btn btn-ghost btn-sm" onclick="viewMemory('${k}')">View</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMemory('${k}')">Delete</button>
      </div>
    </div>`).join('');

  // Load values
  keys.forEach(k => {
    API.get('/api/v1/memory?key=' + encodeURIComponent(k)).then(data => {
      const el = document.getElementById('mem-val-' + CSS.escape(k));
      if (el && data.value) el.textContent = data.value;
    }).catch(() => {});
  });
}

function filterMemory() {
  const prefix = document.getElementById('memory-search').value;
  renderMemoryGrid(state.memoryKeys.filter(k => k.startsWith(prefix)));
}

function openMemoryModal() {
  openModal('Add Memory Entry', `
    <div class="form-group"><label class="form-label">Key</label><input type="text" id="mem-key" placeholder="my-key"></div>
    <div class="form-group"><label class="form-label">Value</label><textarea id="mem-value" placeholder="The value to store"></textarea></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveMemory()">Save</button>`);
}

async function saveMemory() {
  try {
    await API.post('/api/v1/memory', {
      key: document.getElementById('mem-key').value,
      value: document.getElementById('mem-value').value,
    });
    closeModal();
    toast('Memory saved', 'success');
    renderMemory(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

async function viewMemory(key) {
  try {
    const data = await API.get('/api/v1/memory?key=' + encodeURIComponent(key));
    openModal('Memory: ' + key, `<pre style="white-space:pre-wrap;word-break:break-all;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text-primary)">${data.value || '(empty)'}</pre>`, '');
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

async function deleteMemory(key) {
  try {
    await API.del('/api/v1/memory/' + encodeURIComponent(key));
    toast('Memory deleted', 'success');
    renderMemory(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════
// PROVIDER
// ═══════════════════════════════════
async function renderProvider(c) {
  c.innerHTML = '<div class="empty-state"><p>Loading provider info...</p></div>';

  try {
    const data = await API.get('/api/v1/provider');
    state.provider = data;

    const models = data.models || [];
    c.innerHTML = `
      <div class="provider-grid">
        <div class="provider-card">
          <h3>Current Provider</h3>
          <div class="provider-value">${data.provider || '—'}</div>
          <div class="provider-label">Provider name</div>
        </div>
        <div class="provider-card">
          <h3>Active Model</h3>
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
            <select id="provider-model-select" style="flex:1">
              ${models.map(m => `<option value="${m}" ${m === data.model ? 'selected' : ''}>${m}</option>`).join('')}
            </select>
            <button class="btn btn-primary btn-sm" onclick="setModel()">Apply</button>
          </div>
          <div class="provider-label">Select a model and click Apply</div>
        </div>
      </div>
      <div class="card" style="margin-top:20px">
        <h3 style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:16px">Available Models</h3>
        <ul class="model-list">
          ${models.map(m => `<li class="${m === data.model ? 'active' : ''}">${m}${m === data.model ? ' <span style="font-size:11px;color:var(--text-muted)"> (active)</span>' : ''}</li>`).join('')}
        </ul>
      </div>`;
  } catch (e) {
    c.innerHTML = `<div class="empty-state"><p>Failed to load provider: ${e.message}</p></div>`;
  }
}

async function setModel() {
  const model = document.getElementById('provider-model-select').value;
  if (!model) return;
  try {
    await API.put('/api/v1/provider/model', { model });
    toast('Model set to ' + model, 'success');
    renderProvider(document.getElementById('main-content'));
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  }
}

// ── Init ──
navigate('dashboard');
</script>
</body>
</html>
