version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  # revive `exported` rule is intentionally disabled: AGENTS.md requires doc
  # comments on every exported symbol, but the storage/provider adapter
  # families have ~80 missing comments today. Adding them is mechanical but
  # outside the scope of "quick wins" — track in a follow-up PR.
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unused

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
